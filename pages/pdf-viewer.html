<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visualizador de PDF de Candela Gencarelli - Artista, educadora e investigadora. PDF Viewer of Candela Gencarelli's - Artist, educator, and researcher."
    />
    <title
      data-es="Visualizador de PDF • Candela Gencarelli"
      data-en="PDF Viewer • Candela Gencarelli"
    >
      Visualizador de PDF • Candela Gencarelli
    </title>
    <link rel="stylesheet" href="../styles.css" />
    <!-- Incluir PDF.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      // Configurar el worker de PDF.js
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
    </script>
  </head>
  <body class="pdf-viewer-page">
    <header class="pdf-viewer-header">
      <a
        href="../index.html"
        class="pdf-viewer-back"
        data-es="← Inicio"
        data-en="← Home"
      >
        ← Inicio
      </a>
      <h1 id="pdf-viewer-title" class="pdf-viewer-title"></h1>
    </header>
    <div class="pdf-container">
      <div id="pdf-viewer" role="main" aria-busy="true"></div>
    </div>

    <!-- Scripts -->
    <script src="../js/translations.js"></script>
    <script src="../main.js"></script>
    <script src="../js/pdf-loader.js"></script>
